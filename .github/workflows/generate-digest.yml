name: Generate Daily Digest

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-digest.js

      - name: Copy latest digest to GitHub Pages root
        run: cp output/digest-latest.html index.html

      - name: Commit and push generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ðŸ“° Daily digest â€” $(date +%Y-%m-%d)"
          file_pattern: "output/ index.html"
          commit_user_name: "Digest Bot"
          commit_user_email: "digest@ourhomeschool.app"


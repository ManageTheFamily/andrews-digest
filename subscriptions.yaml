# Andrews Family Daily Digest - Subscription Config
# Add/remove subscriptions here. The fetch script reads this file.
#
# Fields:
#   name: Display name for the publication
#   url:  RSS feed URL
#   category: Groups articles in the newspaper layout
#   priority: 1 (featured) - 3 (standard). Priority 1 items are candidates for above-the-fold.
#   active: true/false to toggle without deleting

meta:
  digest_title: "The Andrews Family Digest"
  tagline: "Curated knowledge for family, learning, and development"
  # How many hours back to look for articles
  lookback_hours: 24
  # Max articles per category in the output
  max_per_category: 5
  # Claude model to use for summarization
  model: "claude-sonnet-4-20250514"

categories:
  - id: education
    label: "Education & Learning"
    icon: ""
    color: "#2c5f8a"

  - id: baseball
    label: "Baseball & Player Development"
    icon: ""
    color: "#1a6b3a"

  - id: health
    label: "Health, Fitness & Nutrition"
    icon: ""
    color: "#8a3a2c"

  - id: parenting
    label: "Parenting & Family"
    icon: ""
    color: "#5a3a8a"

  - id: tech
    label: "Technology & Tools"
    icon: ""
    color: "#3a6a8a"

  - id: politics
    label: "Politics & Current Events"
    icon: ""
    color: "#2c4a8a"

  - id: finance
    label: "Finance & Markets"
    icon: ""
    color: "#1a5c3a"

  - id: culture
    label: "Arts & Culture"
    icon: ""
    color: "#6a3a8a"

